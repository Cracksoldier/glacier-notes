name: Release builds

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version, without the leading v (for example, 0.2.0)
        required: true
        type: string
      next_development_version:
        description: Optional next version to commit after publishing (for example, 0.3.0-dev.0)
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare release version
    runs-on: ubuntu-latest
    outputs:
      next_version: ${{ steps.versions.outputs.next_version }}
      prerelease: ${{ steps.versions.outputs.prerelease }}
      tag: ${{ steps.versions.outputs.tag }}
      version: ${{ steps.versions.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - id: versions
        name: Validate release versions
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          NEXT_VERSION_INPUT: ${{ inputs.next_development_version }}
          RELEASE_VERSION_INPUT: ${{ inputs.release_version }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == 'push' ]]; then
            release_candidate="${GITHUB_REF_NAME#v}"
            next_candidate=''
          else
            if [[ "$GITHUB_REF" != "refs/heads/$DEFAULT_BRANCH" ]]; then
              echo "::error::Manual releases must run from the $DEFAULT_BRANCH branch."
              exit 1
            fi
            release_candidate="${RELEASE_VERSION_INPUT#v}"
            next_candidate="${NEXT_VERSION_INPUT#v}"
          fi

          npm version "$release_candidate" \
            --no-git-tag-version --allow-same-version --ignore-scripts >/dev/null
          release_version="$(node -p "require('./package.json').version")"
          if [[ "$release_candidate" != "$release_version" ]]; then
            echo "::error::Release version must be normalized SemVer; expected $release_version."
            exit 1
          fi

          next_version=''
          if [[ -n "$next_candidate" ]]; then
            npm version "$next_candidate" \
              --no-git-tag-version --allow-same-version --ignore-scripts >/dev/null
            next_version="$(node -p "require('./package.json').version")"
            if [[ "$next_candidate" != "$next_version" ]]; then
              echo "::error::Next development version must be normalized SemVer;" \
                "expected $next_version."
              exit 1
            fi
            if [[ "$next_version" == "$release_version" ]]; then
              echo '::error::Next development version must differ from the release version.'
              exit 1
            fi
          fi

          prerelease=false
          if [[ "$release_version" == *-* ]]; then
            prerelease=true
          fi

          {
            echo "version=$release_version"
            echo "tag=v$release_version"
            echo "next_version=$next_version"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

  quality:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Stamp release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: >-
          npm version "$RELEASE_VERSION" --no-git-tag-version
          --allow-same-version --ignore-scripts
      - run: npm ci
      - run: npm run format:check
      - run: npm test -- --watch=false
      - run: npm run build
      - run: npm run verify:offline

  package:
    needs: [prepare, quality]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            command: npm run package:linux
            artifact: release/*.AppImage
            artifact_extra: release/*.deb
          - os: windows-latest
            platform: win32
            command: npm run package:win
            artifact: release/*.exe
            artifact_extra: ''
          - os: macos-15-intel
            platform: darwin
            command: npm run package:mac
            artifact: release/*.dmg
            artifact_extra: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Stamp release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: >-
          npm version "$RELEASE_VERSION" --no-git-tag-version
          --allow-same-version --ignore-scripts
      - run: npm ci
      - run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - run: npm run verify:offline
      - if: matrix.platform == 'linux'
        name: Configure Linux sandbox for smoke test
        run: |
          sudo chown root:root release/linux-unpacked/chrome-sandbox
          sudo chmod 4755 release/linux-unpacked/chrome-sandbox
          test "$(stat -c '%U:%G %a' release/linux-unpacked/chrome-sandbox)" = 'root:root 4755'
      - if: matrix.platform == 'linux'
        run: xvfb-run -a npm run smoke:packaged -- linux
      - if: matrix.platform != 'linux'
        run: npm run smoke:packaged -- ${{ matrix.platform }}
      - uses: actions/upload-artifact@v7
        with:
          name: glacier-notes-${{ matrix.platform }}-x64
          if-no-files-found: error
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact_extra }}

  publish:
    name: Publish GitHub Release
    needs: [prepare, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: glacier-notes-*-x64
          path: release-assets
          merge-multiple: true
      - name: Verify release assets
        shell: bash
        run: |
          shopt -s nullglob

          assert_count() {
            expected="$1"
            label="$2"
            shift 2
            if [[ "$#" -ne "$expected" ]]; then
              echo "::error::Expected $expected $label release asset(s), found $#."
              exit 1
            fi
          }

          assert_count 1 AppImage release-assets/*.AppImage
          assert_count 1 Debian-package release-assets/*.deb
          assert_count 2 Windows-executable release-assets/*.exe
          assert_count 1 macOS-disk-image release-assets/*.dmg

          assets=(release-assets/*)
          if [[ "${#assets[@]}" -ne 5 ]]; then
            echo "::error::Expected exactly 5 release assets, found ${#assets[@]}."
            exit 1
          fi
          printf 'Release asset: %s\n' "${assets[@]}"
      - name: Create GitHub Release
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          shopt -s nullglob
          assets=(release-assets/*)
          release_options=(
            --title "Glacier Notes $RELEASE_TAG"
            --generate-notes
          )

          if [[ "$GITHUB_EVENT_NAME" == 'push' ]]; then
            release_options+=(--verify-tag)
          else
            release_options+=(--target "$GITHUB_SHA")
          fi
          if [[ "$PRERELEASE" == 'true' ]]; then
            release_options+=(--prerelease --latest=false)
          fi

          gh release create "$RELEASE_TAG" \
            "${release_options[@]}" \
            "${assets[@]}"

  next-version:
    name: Set next development version
    needs: [prepare, publish]
    if: needs.prepare.outputs.next_version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Update package version
        shell: bash
        env:
          NEXT_VERSION: ${{ needs.prepare.outputs.next_version }}
        run: >-
          npm version "$NEXT_VERSION" --no-git-tag-version
          --allow-same-version --ignore-scripts
      - name: Commit next development version
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          NEXT_VERSION: ${{ needs.prepare.outputs.next_version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json package-lock.json
          git commit -m "Start $NEXT_VERSION development"
          git push origin "HEAD:$DEFAULT_BRANCH"
