<dialog #dialog class="editor" (cancel)="onCancel($event)" (click)="onBackdropClick($event)">
  <div class="editor__body" (dragover)="onDragOver($event)" (drop)="onDrop($event)" (paste)="onPaste($event)">
    <input
      #fileInput
      type="file"
      multiple
      accept="image/png,image/jpeg,image/webp,image/gif"
      hidden
      (change)="onFilesPicked($any($event.target))"
    />
    <div class="editor__header">
      <input
        class="editor__title"
        appAutofocus
        placeholder="Title"
        [value]="title()"
        (input)="onTitleInput($any($event.target).value)"
      />
      <button type="button" class="editor__close" title="Close" (click)="close()">
        <i class="fa-solid fa-xmark" aria-hidden="true"></i>
      </button>
    </div>

    @if (note().imageIds.length > 0) {
      <div class="editor__images">
        @for (id of note().imageIds; track id) {
          <div class="editor__image-wrap">
            <img
              class="editor__image"
              [src]="id | glacierImg"
              alt=""
              tabindex="0"
              (click)="ui.openLightbox(id)"
              (keydown.enter)="ui.openLightbox(id)"
            />
            <button type="button" class="editor__image-remove" title="Remove image" (click)="removeImage(id)">
              <i class="fa-solid fa-xmark" aria-hidden="true"></i>
            </button>
          </div>
        }
      </div>
    }

    @if (isChecklist()) {
      <div class="editor__checklist">
        <app-checklist-editor
          [items]="items()"
          [moveCheckedToBottom]="settings.moveCheckedToBottom()"
          (itemsChange)="onItemsChange($event)"
        />
      </div>
    } @else {
      <div class="editor__toolbar">
        <app-markdown-toolbar [disabled]="previewMode()" (action)="onToolbar($event)" />
        <button
          type="button"
          class="editor__preview-toggle"
          [class.editor__preview-toggle--active]="previewMode()"
          [title]="previewMode() ? 'Edit' : 'Preview'"
          (click)="previewMode.set(!previewMode())"
        >
          <i class="fa-solid" [class.fa-eye]="!previewMode()" [class.fa-pen]="previewMode()" aria-hidden="true"></i>
          {{ previewMode() ? 'Edit' : 'Preview' }}
        </button>
      </div>

      @if (previewMode()) {
        <div class="editor__preview markdown-body" [innerHTML]="previewHtml()" (click)="onPreviewClick($event)"></div>
      } @else {
        <textarea
          class="editor__content"
          #textarea
          placeholder="Take a note…"
          [value]="content()"
          (input)="onContentInput($any($event.target).value)"
        ></textarea>
      }
    }

    <div class="editor__footer">
      <div class="editor__footer-actions">
        <button type="button" class="editor__convert" (click)="convert()">
          <i
            class="fa-solid"
            [class.fa-list-check]="!isChecklist()"
            [class.fa-file-lines]="isChecklist()"
            aria-hidden="true"
          ></i>
          {{ isChecklist() ? 'Convert to text note' : 'Convert to checklist' }}
        </button>
        <button type="button" class="editor__add-image" (click)="openImagePicker()">
          <i class="fa-solid fa-image" aria-hidden="true"></i>
          Add image
        </button>
        @if (isChecklist()) {
          <label class="editor__setting">
            <input
              type="checkbox"
              [checked]="settings.moveCheckedToBottom()"
              (change)="settings.setMoveCheckedToBottom($any($event.target).checked)"
            />
            Move checked to bottom
          </label>
        }
      </div>
      <span class="editor__meta">Edited {{ note().updatedAt | date: 'medium' }}</span>
    </div>
  </div>
</dialog>
