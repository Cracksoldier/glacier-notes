<header class="header">
  <div class="header__brand">
    <i class="fa-solid fa-snowflake header__logo" aria-hidden="true"></i>
    <span class="header__title">Glacier Notes</span>
  </div>

  <div class="header__search">
    <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
    <input
      #searchInput
      type="search"
      [placeholder]="i18n.t('header.searchPlaceholder')"
      [value]="ui.searchQuery()"
      (input)="onSearchInput(searchInput.value)"
      (keydown.escape)="clearSearch(searchInput)"
    />
    @if (ui.searching() && ui.view()?.kind === 'notebook') {
      <button type="button" class="header__search-scope" (click)="ui.toggleSearchScope()">
        {{ ui.searchScope() === 'all' ? i18n.t('header.scopeAll') : i18n.t('header.scopeNotebook') }}
      </button>
    }
    @if (ui.searching()) {
      <button
        type="button"
        class="header__search-clear"
        [attr.aria-label]="i18n.t('header.clearSearch')"
        (click)="clearSearch(searchInput)"
      >
        <i class="fa-solid fa-xmark" aria-hidden="true"></i>
      </button>
    }
  </div>

  <div class="header__actions">
    <button
      type="button"
      class="icon-button"
      (click)="toggleTheme()"
      [attr.aria-label]="isDark() ? i18n.t('header.switchToLight') : i18n.t('header.switchToDark')"
    >
      <i class="fa-solid" [class.fa-sun]="isDark()" [class.fa-moon]="!isDark()" aria-hidden="true"></i>
    </button>
    <button
      type="button"
      class="icon-button"
      [attr.aria-label]="i18n.t('header.settings')"
      (click)="ui.openSettings()"
    >
      <i class="fa-solid fa-gear" aria-hidden="true"></i>
    </button>
  </div>
</header>
